services:
  mysql:
    image: mysql:8.0
    container_name: lead-radar-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lead_radar
      MYSQL_USER: lead_radar
      MYSQL_PASSWORD: lead_radar
    ports:
      - "3306:3306"
    volumes:
      - lead_radar_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  lead_radar_mysql_data:
